{% extends 'base.html' %}

{% block content %}
<div style="max-width: 500px; margin: 0 auto;">
    <article style="border-radius: 12px;">
        <header>
            <h4 style="margin:0; text-align:center;">📝 注册新账户</h4>
        </header>
        <form method="POST">
            {% csrf_token %} <label for="username">登录账户名 (不可重复)</label>
            <input type="text" id="username" name="username" placeholder="用于登录的账号" required>

            <label for="nickname">显示网名 (各个页面展示用)</label>
            <input type="text" id="nickname" name="nickname" placeholder="你想展示给别人口的昵称" required>

            <label for="password">登录密码</label>
            <input type="password" id="password" name="password" placeholder="请输入密码" required>

            <button type="submit" style="width: 100%; margin-top: 15px;">确认注册</button>
        </form>
        <footer style="text-align: center;">已有账号？ <a href="{% url 'login' %}">点此登录</a></footer>
    </article>
</div>
{% endblock %}
