<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KataKatsu - Django版</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
    <style>
        body {
            padding-top: 20px;
        }

        nav {
            margin-bottom: 40px;
        }

        .flash-messages {
            margin-bottom: 20px;
        }

        .flash-message {
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
    </style>
</head>

<body>
    <main class="container">
        <nav>
            <ul>
                <li><strong><a href="{% url 'index' %}" style="text-decoration: none; color: inherit;">🇯🇵 KataKatsu
                            Django</a></strong></li>
            </ul>
            <ul>
                <li><a href="{% url 'index' %}">首页</a></li>
                {% if user.is_authenticated %}
                <li><span>👤 欢迎，{{ user.profile.nickname }}</span></li>
                <li><a href="{% url 'logout' %}" class="secondary">退出</a></li>
                {% else %}
                <li><a href="{% url 'login' %}">登录</a></li>
                <li><a href="{% url 'register' %}" class="outline">注册</a></li>
                {% endif %}
            </ul>
        </nav>

        {% if messages %}
        <div class="flash-messages">
            {% for message in messages %}
            <div class="flash-message {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}

        {% block content %}{% endblock %}
    </main>
</body>

</html>
